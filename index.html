<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي تكنولوجيا المعلومات - الفصل الأول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f39c12;
            --success: #27ae60;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: var(--light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hidden { display: none; }

        h1 { color: var(--secondary); margin-bottom: 20px; }
        .score-box { font-size: 1.2rem; margin-bottom: 10px; }
        
        .timer-container {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 5px solid var(--secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            font-weight: bold;
        }

        .question-text { font-size: 1.5rem; margin-bottom: 25px; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid transparent;
            padding: 15px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
            outline: none;
        }

        .btn:hover { background: rgba(255,255,255,0.3); border-color: var(--secondary); }

        .input-box {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
        }

        #feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }

        .correct { background-color: var(--success); }
        .wrong { background-color: var(--danger); }

        #start-btn, #restart-btn {
            background: var(--secondary);
            color: var(--dark);
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h1>تحدي تكنولوجيا المعلومات 🚀</h1>
        <p>جاهز يا رِفْعَت؟ قدامك 70 سؤال من الفصل الأول.</p>
        <p>كل سؤال له 30 ثانية بس!</p>
        <button id="start-btn" onclick="startQuiz()">ابدأ التحدي الآن</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="score-box">السؤال: <span id="q-num">1</span>/70 | السكور: <span id="score">0</span></div>
        <div class="timer-container" id="timer">30</div>
        <div class="question-text" id="question"></div>
        
        <div id="mcq-options" class="options-grid"></div>
        
        <div id="completion-input" class="hidden">
            <input type="text" id="answer-input" class="input-box" placeholder="اكتب الإجابة هنا...">
            <button class="btn" onclick="checkCompletion()">تأكيد الإجابة</button>
        </div>

        <div id="feedback" class="hidden"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h1>انتهى التحدي! 🎉</h1>
        <p style="font-size: 2rem;">جبت <span id="final-score">0</span> من 70</p>
        <button id="restart-btn" onclick="location.reload()">إعادة المحاولة</button>
    </div>
</div>

<script>
    // الداتا مجمعة من الفصل الأول (ص 1 - 29)
    const questions = [
        // 30 اختيار من متعدد (MCQ) [cite: 9, 10, 15, 18, 24]
        { type: 'mcq', q: "ايه هو العلم اللي بيتعامل مع جمع ومعالجة وتخزين المعلومات؟", options: ["تكنولوجيا الاتصالات", "تكنولوجيا المعلومات", "البرمجة", "الشبكات"], a: "تكنولوجيا المعلومات" },
        { type: 'mcq', q: "أي من الآتي يعتبر من خصائص تكنولوجيا المعلومات والاتصالات؟", options: ["الغموض", "التوقيت", "العشوائية", "التحيز"], a: "التوقيت" },
        { type: 'mcq', q: "البنية التحتية اللي بتخلي الشركات تأجر موارد الحوسبة بدل ما تشتريها هي:", options: ["التقليدية", "السحابية", "المختلطة", "المادية"], a: "السحابية" },
        { type: 'mcq', q: "مصطلح الـ 5 Vs مرتبط بأي تقنية؟", options: ["إنترنت الأشياء", "البيانات الضخمة", "البلوك تشين", "الواقع المعزز"], a: "البيانات الضخمة" },
        { type: 'mcq', q: "مين اللي صك مصطلح 'الذكاء الاصطناعي' سنة 1956؟", options: ["جون مكارثي", "تيورنج", "نيك سابو", "ستراشي"], a: "جون مكارثي" },
        { type: 'mcq', q: "تقنية بتضيف معلومات رقمية للعالم الحقيقي اللي بنشوفه هي:", options: ["VR", "AR", "IoT", "Big Data"], a: "AR" },
        { type: 'mcq', q: "الجيل اللي بيوصل سرعته لـ 10 جيجابايت في الثانية هو:", options: ["3G", "4G", "5G", "2G"], a: "5G" },
        { type: 'mcq', q: "من الأبعاد الأخلاقية لاستخدام التكنولوجيا:", options: ["زيادة التكاليف", "خصوصية المعلومات", "سرعة المعالج", "نوع الشاشة"], a: "خصوصية المعلومات" },
        { type: 'mcq', q: "عملية تحويل الأنشطة التجارية التقليدية لأنظمة رقمية تسمى:", options: ["الرقمنة", "التحول الرقمي", "الميكنة", "الأتمتة"], a: "التحول الرقمي" },
        { type: 'mcq', q: "سلسلة من كتل البيانات المؤمنة بالتشفير تسمى:", options: ["إنترنت الأشياء", "البلوك تشين", "قواعد البيانات", "الحوسبة"], a: "البلوك تشين" },
        // ... (تكملة الـ 30 MCQ)
        { type: 'mcq', q: "خاصية في البيانات الضخمة بتشير لمدى صحة وموثوقية البيانات:", options: ["Volume", "Velocity", "Veracity", "Value"], a: "Veracity" },
        { type: 'mcq', q: "الذكاء الاصطناعي فرع من فروع علم:", options: ["الرياضيات", "الحاسوب", "الإحصاء", "الفيزياء"], a: "الحاسوب" },
        { type: 'mcq', q: "تقنية بتخلي الأجهزة تتواصل مع بعضها عبر الإنترنت:", options: ["Big Data", "IoT", "Blockchain", "5G"], a: "IoT" },
        { type: 'mcq', q: "الفجوة الرقمية هي الفرق في الوصول للتكنولوجيا بين:", options: ["الشباب وكبار السن", "الدول المتقدمة والنامية", "الرجال والنساء", "المهندسين والأطباء"], a: "الدول المتقدمة والنامية" },
        { type: 'mcq', q: "نظام تشغيل موبايل مفتوح المصدر ومبني على لينكس:", options: ["iOS", "Windows", "Android", "Blackberry"], a: "Android" },
        { type: 'mcq', q: "تطبيق يستخدم للوصول للأماكن عبر الملاحة الجغرافية:", options: ["Google Docs", "GPS", "Spotify", "Babbel"], a: "GPS" },
        { type: 'mcq', q: "أهم الموارد الاستراتيجية في المجتمع المعاصر هي:", options: ["البترول", "المعلومات", "الذهب", "المعادن"], a: "المعلومات" },
        { type: 'mcq', q: "من فوائد البنية التحتية الحديثة:", options: ["زيادة الابتكار", "بطء الشبكة", "زيادة التعطل", "فقد البيانات"], a: "زيادة الابتكار" },
        { type: 'mcq', q: "التحول المؤسسي يهدف لإعادة اكتشاف:", options: ["الموظفين", "المؤسسة وثقافتها", "العملاء", "المباني"], a: "المؤسسة وثقافتها" },
        { type: 'mcq', q: "أول موقع سمح بإنشاء بروفايل وإضافة أصدقاء (1997):", options: ["Facebook", "SixDegrees.com", "Twitter", "MySpace"], a: "SixDegrees.com" },
        { type: 'mcq', q: "منصة تواصل اجتماعي تركز على الصور بشكل أساسي:", options: ["YouTube", "Twitter", "Pinterest", "LinkedIn"], a: "Pinterest" },
        { type: 'mcq', q: "العلاقة بين البيانات والمعلومات هي أن المعلومات:", options: ["مادة أولية", "ناتج معالجة البيانات", "أقل قيمة", "غير منظمة"], a: "ناتج معالجة البيانات" },
        { type: 'mcq', q: "المنطق اللي بيحاكي تفكير البشر في الاحتمالات يسمى:", options: ["منطق رياضي", "منطق ضبابي (Fuzzy)", "منطق رسمي", "لا شيء"], a: "منطق ضبابي (Fuzzy)" },
        { type: 'mcq', q: "تقنية بتخلي الحواسيب تفهم العالم المرئي من الصور:", options: ["معالجة لغة", "الرؤية الحاسوبية", "الروبوتات", "التنقيب"], a: "الرؤية الحاسوبية" },
        { type: 'mcq', q: "أداة ذكاء اصطناعي توليدي مشهورة:", options: ["Zotero", "ChatGPT", "Excel", "Word"], a: "ChatGPT" },
        { type: 'mcq', q: "في البلوك تشين، بمجرد تسجيل البيانات:", options: ["سهل حذفها", "لا يمكن تغييرها", "تختفي فوراً", "تتعدل يومياً"], a: "لا يمكن تغييرها" },
        { type: 'mcq', q: "من تحديات التحول الرقمي:", options: ["نقص المتخصصين", "زيادة الرواتب", "سهولة التعلم", "توفر الإنترنت"], a: "نقص المتخصصين" },
        { type: 'mcq', q: "تطبيق تعليمي لتعلم اللغات:", options: ["Duolingo", "Spotify", "Netflix", "Uber"], a: "Duolingo" },
        { type: 'mcq', q: "وحدة قياس بطارية الموبايل هي:", options: ["فولت", "ميللي أمبير (mAh)", "وات", "أوم"], a: "ميللي أمبير (mAh)" },
        { type: 'mcq', q: "مهمة تكنولوجيا الاتصالات الأساسية هي:", options: ["تخزين البيانات", "الحفاظ على أنظمة الاتصال", "كتابة الأكواد", "تصميم الصور"], a: "الحفاظ على أنظمة الاتصال" },

        // 20 أكمل (Completion) [cite: 13, 16, 21, 28]
        { type: 'comp', q: "تعتبر الـ .... هي المادة الأولية التي تستخلص منها المعلومات.", a: "البيانات" },
        { type: 'comp', q: "يتم الوصول لموارد الحوسبة السحابية عن طريق ....", a: "الإنترنت" },
        { type: 'comp', q: "الجيل السادس 6G سيمكّن من إجراء العمليات الجراحية عن ....", a: "بعد" },
        { type: 'comp', q: "يشير مصطلح IoT إلى إنترنت ....", a: "الأشياء" },
        { type: 'comp', q: "الذكاء الاصطناعي التوليدي قادر على إنشاء .... جديد.", a: "محتوى" },
        { type: 'comp', q: "تعتبر .... أكبر موسوعة مفتوحة على الإنترنت.", a: "ويكيبيديا" },
        { type: 'comp', q: "نظام التشغيل الخاص بشركة آبل هو ....", a: "iOS" },
        { type: 'comp', q: "الـ .... هو عقل الجهاز المسؤول عن السرعة والأداء.", a: "المعالج" },
        { type: 'comp', q: "تعد .... أول خطوة في مراحل التحول الرقمي.", a: "الرقمنة" },
        { type: 'comp', q: "من خصائص Big Data ضخامة الـ ....", a: "الحجم" },
        { type: 'comp', q: "يعتمد البلوك تشين على شبكة .... إلى نظير.", a: "نظير" },
        { type: 'comp', q: "الواقع .... يخلق بيئة محاكاة كاملة عبر الحاسوب.", a: "الافتراضي" },
        { type: 'comp', q: "تحمي الأبعاد .... حقوق الأفراد في البيئة الرقمية.", a: "الأخلاقية" },
        { type: 'comp', q: "تستخدم تقنية .... Pixel في كاميرات الموبايل لصور أدق.", a: "Dual" },
        { type: 'comp', q: "خدمة جوجل للتخزين السحابي تسمى جوجل ....", a: "درايف" },
        { type: 'comp', q: "الويب 2.0 أتاح للمستخدم أن يكون منتجاً للـ ....", a: "محتوى" },
        { type: 'comp', q: "اختبار .... يستخدم للتفرقة بين الإنسان والآلة ذكياً.", a: "تيورنج" },
        { type: 'comp', q: "الجيل الخامس 5G يتميز بتأخير أقل بكثير في .... البيانات.", a: "نقل" },
        { type: 'comp', q: "من تطبيقات المنازل الذكية التحكم في .... عبر الهاتف.", a: "الإضاءة" },
        { type: 'comp', q: "الحوسبة .... توفر موارد مرنة وقابلة للتوسع.", a: "السحابية" },

        // 20 صح وغلط (T/F) [cite: 11, 13, 18, 22, 27]
        { type: 'mcq', q: "تكنولوجيا المعلومات وتكنولوجيا الاتصالات هما نفس الشيء تماماً.", options: ["صح", "غلط"], a: "غلط" },
        { type: 'mcq', q: "البنية التحتية التقليدية مكلفة في الإعداد والصيانة.", options: ["صح", "غلط"], a: "صح" },
        { type: 'mcq', q: "التحول الرقمي هو مجرد ميكنة للعمليات الورقية.", options: ["صح", "غلط"], a: "غلط" },
        { type: 'mcq', q: "البيانات الضخمة لا يمكن معالجتها بقواعد البيانات التقليدية.", options: ["صح", "غلط"], a: "صح" },
        { type: 'mcq', q: "البلوك تشين يدار بشكل مركزي من قبل وسيط واحد.", options: ["صح", "غلط"], a: "غلط" },
        { type: 'mcq', q: "الواقع المعزز AR يبني على بيئة موجودة سابقاً ولا يخلق عالم افتراضي كامل.", options: ["صح", "غلط"], a: "صح" },
        { type: 'mcq', q: "سرعة تحميل الـ 5G تصل لعشرات المرات أسرع من الـ 4G.", options: ["صح", "غلط"], a: "صح" },
        { type: 'mcq', q: "حقوق النشر الرقمية لا تشمل البرمجيات والموسيقى.", options: ["صح", "غلط"], a: "غلط" },
        { type: 'mcq', q: "التعلم الآلي هو أحد فروع الذكاء الاصطناعي.", options: ["صح", "غلط"], a: "صح" },
        { type: 'mcq', q: "تقنية IoT تقتصر فقط على أجهزة الكمبيوتر والهواتف.", options: ["صح", "غلط"], a: "غلط" },
        { type: 'mcq', q: "المعلومات هي الحلقة الوسطى بين البيانات والمعرفة.", options: ["صح", "غلط"], a: "صح" },
        { type: 'mcq', q: "الشمول الرقمي يعني تصميم خدمات متاحة للجميع بدون تمييز.", options: ["صح", "غلط"], a: "صح" },
        { type: 'mcq', q: "نظام الأندرويد تملكه شركة آبل.", options: ["صح", "غلط"], a: "غلط" },
        { type: 'mcq', q: "تعتبر سرعة النمو الهائل من خصائص البيانات الضخمة.", options: ["صح", "غلط"], a: "صح" },
        { type: 'mcq', q: "الذكاء الاصطناعي يساعد في تقليل الضغوط النفسية عن البشر في المهام الشاقة.", options: ["صح", "غلط"], a: "صح" },
        { type: 'mcq', q: "متاجر التطبيقات ظهرت لأول مرة سنة 2008.", options: ["صح", "غلط"], a: "صح" },
        { type: 'mcq', q: "لا يمكن استخدام الموبايل في حجز تذاكر الطيران.", options: ["صح", "غلط"], a: "غلط" },
        { type: 'mcq', q: "الخصوصية تعني حق الأفراد في التحكم في بياناتهم الشخصية.", options: ["صح", "غلط"], a: "صح" },
        { type: 'mcq', q: "6G تقنية قديمة وتم استبدالها بالـ 5G.", options: ["صح", "غلط"], a: "غلط" },
        { type: 'mcq', q: "المعلومات تساعد أصحاب القرار على اتخاذ قرارات دقيقة.", options: ["صح", "غلط"], a: "صح" }
    ];

    let currentQ = 0;
    let score = 0;
    let timer;
    let timeLeft = 30;

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQ];
        document.getElementById('q-num').innerText = currentQ + 1;
        document.getElementById('question').innerText = q.q;
        document.getElementById('feedback').classList.add('hidden');
        resetTimer();

        if (q.type === 'mcq') {
            document.getElementById('mcq-options').classList.remove('hidden');
            document.getElementById('completion-input').classList.add('hidden');
            const optionsBox = document.getElementById('mcq-options');
            optionsBox.innerHTML = '';
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt);
                optionsBox.appendChild(btn);
            });
        } else {
            document.getElementById('mcq-options').classList.add('hidden');
            document.getElementById('completion-input').classList.remove('hidden');
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
        }
    }

    function checkAnswer(ans) {
        clearInterval(timer);
        const correct = questions[currentQ].a;
        if (ans === correct) {
            score++;
            showFeedback(true, "صح يا بطل! ✅");
        } else {
            showFeedback(false, `غلط للأسف. الإجابة الصح: ${correct} ❌`);
        }
    }

    function checkCompletion() {
        const userAns = document.getElementById('answer-input').value.trim();
        checkAnswer(userAns);
    }

    function showFeedback(isCorrect, msg) {
        const f = document.getElementById('feedback');
        f.innerText = msg;
        f.className = isCorrect ? 'correct' : 'wrong';
        f.classList.remove('hidden');
        document.getElementById('score').innerText = score;

        setTimeout(() => {
            currentQ++;
            if (currentQ < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }, 2000);
    }

    function resetTimer() {
        clearInterval(timer);
        timeLeft = 30;
        document.getElementById('timer').innerText = timeLeft;
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                checkAnswer("وقت انتهى");
            }
        }, 1000);
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
    }
</script>

</body>
</html>
