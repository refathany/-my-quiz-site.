    <style>

        .wrong { background-color: #442326; color: #ff7b72; border: 1px solid #da3633; }

        #next-btn:hover { background-color: #388bfd; }
        #score-screen { display: none; text-align: center; padding: 40px 0; }
        .progress-bar { height: 8px; background: #30363d; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: #58a6ff; width: 0%; transition: 0.4s; }
    </style>
</head>
<body>

<div id="quiz-container">

            <div id="options" class="options"></div>

</div>

let currentQuestion = 0;
let score = 0;

function loadQuestion() {
    const data = quizData[currentQuestion];
    document.getElementById('category').innerText = data.cat;
    document.getElementById('question').innerText = data.q;
    document.getElementById('progress-fill').style.width = ((currentQuestion / quizData.length) * 100) + "%";
    
    const optionsBox = document.getElementById('options');
    optionsBox.innerHTML = '';
    
    data.opt.forEach(o => {
        const btn = document.createElement('button');
        btn.innerText = o;
        btn.onclick = () => checkAnswer(o);
        optionsBox.appendChild(btn);
    });

    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
}

function checkAnswer(choice) {
    const data = quizData[currentQuestion];
    const feedback = document.getElementById('feedback');
    const buttons = document.querySelectorAll('.options button');
    
    buttons.forEach(b => b.disabled = true);

    feedback.style.display = 'block';
    if(choice === data.a) {
        feedback.innerText = "عاش يا رِفْعَت! إجابة صحيحة. ✅ \n" + data.r;
        feedback.className = 'correct';
        score++;
    } else {
        feedback.innerText = "للاسف غلط.. ركز يا بصل. ❌ \n الإجابة الصح: " + data.a + ". \n" + data.r;
        feedback.className = 'wrong';
    }
    document.getElementById('next-btn').style.display = 'block';
}

document.getElementById('next-btn').onclick = () => {
    currentQuestion++;
    if(currentQuestion < quizData.length) {
        loadQuestion();
    } else {
        showFinalScore();
    }
};

function showFinalScore() {
    document.getElementById('quiz-area').style.display = 'none';
    const screen = document.getElementById('score-screen');
    screen.style.display = 'block';
    document.getElementById('final-score').innerText = score + " / " + quizData.length;
    
    let msg = "";
    if(score > 50) msg = "دكتور GIS قادم! 👑";
    else if(score > 30) msg = "مستوى كويس، بس محتاج مراجعة بسيطة. 👍";
    else msg = "راجع المحاضرات تاني يا رِفْعَت، لسه بدري. ⚠️";
    document.getElementById('final-msg').innerText = msg;
}

loadQuestion();
</script>
