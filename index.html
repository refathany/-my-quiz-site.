<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>امتحان الخرائط الرقمية ونظم المعلومات الجغرافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #3b82f6;
            --background: #f1f5f9;
            --text: #1e293b;
            --success: #10b981;
            --danger: #ef4444;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 2.5rem; }
        header p { margin-top: 0.5rem; font-size: 1.2rem; opacity: 0.9; }
        
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .progress-bar {
            background: #e2e8f0;
            border-radius: 8px;
            height: 10px;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        .progress-fill {
            background: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 4px solid var(--primary);
            min-height: 300px;
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 1rem;
        }
        .question-type { font-weight: 900; color: var(--secondary); font-size: 1.2rem;}
        .question-counter { font-weight: bold; color: #64748b; }
        
        .question-title { font-weight: 700; font-size: 1.4rem; margin-bottom: 1.5rem; color: var(--text); }
        
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }
        
        .option-label {
            display: flex;
            align-items: center;
            padding: 1rem;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.1rem;
        }
        .option-label:hover { border-color: var(--secondary); background: #eff6ff; }
        .option-label input { margin-left: 15px; transform: scale(1.3); }
        
        textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            resize: vertical;
            min-height: 150px;
            box-sizing: border-box;
        }
        textarea:focus { outline: none; border-color: var(--primary); }
        
        .action-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            font-size: 1.3rem;
            font-weight: 900;
            font-family: 'Tajawal', sans-serif;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 2rem;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }
        .action-btn:hover { background: #1d4ed8; }
        .action-btn.next-mode { background: var(--success); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .action-btn.next-mode:hover { background: #059669; }
        
        .result-section { 
            display: none; 
            margin-top: 1.5rem; 
            padding: 1.5rem; 
            border-radius: 8px; 
            font-size: 1.1rem;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .correct-bg { background: #d1fae5; border-right: 5px solid var(--success); color: #065f46;}
        .wrong-bg { background: #fee2e2; border-right: 5px solid var(--danger); color: #991b1b;}
        .model-answer { margin-top: 10px; font-weight: bold; color: var(--primary); background: #fff; padding: 10px; border-radius: 5px; border: 1px solid #e2e8f0;}
        
        #scoreBoard {
            display: none;
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 5px solid var(--primary);
        }
        #scoreBoard h2 { font-size: 3rem; color: var(--primary); margin: 0; }
        #scoreBoard p { font-size: 1.5rem; color: #475569; }
    </style>
</head>
<body>

<header>
    <h1>تحدي الخرائط الرقمية</h1>
    <p>تدريب خطوة بخطوة يا رِفْعَت - ركز في كل سؤال</p>
</header>

<div class="container">
    <div id="quizApp">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="card" id="questionCard">
            <div class="question-header">
                <span class="question-type" id="qType">اختيار من متعدد</span>
                <span class="question-counter" id="qCounter">سؤال 1 من 70</span>
            </div>
            
            <div class="question-title" id="qTitle"></div>
            
            <div id="inputArea">
                </div>
            
            <div class="result-section" id="feedbackArea"></div>
            
            <button class="action-btn" id="actionBtn" onclick="handleAction()">تأكيد الإجابة</button>
        </div>
    </div>

    <div id="scoreBoard">
        <h2 id="finalScoreText"></h2>
        <p id="motivationText"></p>
        <button class="action-btn" onclick="location.reload()" style="width:50%; margin: 2rem auto 0;">جرب تاني</button>
    </div>
</div>

<script>
// البيانات (نفس الـ 70 سؤال)
const mcqs = [
{q:"أول من رسم خريطة للعالم توضح حدود الأرض والبحار وجعل العالم قرص مستدير يحيط به المحيط هو:", options:["هيرودوت","أنكز مندر","بطليموس","استرابو"], answer:1, exp:"أنكز مندر هو أول جغرافي وضع خريطة توضح حدود الأرض والبحار كقرص مستدير."},
{q:"العالم الذي جعل البحر المتوسط يتصل بالبحر الخارجي عن طريق مضيق جبل طارق في خريطته هو:", options:["إيراتوستين","هيكاتيوس","هيرودوت","مركيتور"], answer:2, exp:"هيرودوت هو أول من ذكر هذه الحقائق العلمية وجعل خريطته مستطيلة."},
{q:"أي من الخرائط التاريخية التالية تم العثور عليها في حفائر بشمال بابل ويرجع عمرها لـ 4500 عام؟", options:["خريطة المنجم المصري","خريطة جار - صور","خريطة مارينو سنودو","خريطة الإدريسي"], answer:1, exp:"خريطة جار - صور بالعراق هي من أقدم الخرائط وتوضح حيازة في وادي نهر."},
{q:"أول من حسب مساحة الأرض بدرجة قريبة من الحقيقة واعتمد على محورين متقاطعين عند جزيرة رودس؟", options:["هيباركوس","بطليموس","إيراتوستين","المسعودي"], answer:2, exp:"إيراتوستين كان أميناً لمكتبة الإسكندرية وهو من قام بهذا الحساب."},
{q:"صاحب خريطة العالم الملونة التي رسمت بناءً على اهتمامات فلكية في العصر الإسلامي وفقدت ولم يتبق منها سوى الوصف؟", options:["الإدريسي","البلخي","المسعودي","المأمون (الخريطة المأمونية)"], answer:3, exp:"الخريطة المأمونية رسمت بأمر الخليفة المأمون وفاقت خرائط بطليموس."},
{q:"في خرائط العالم التي رسمها العرب (مثل الإدريسي)، كان الاتجاه الذي يوضع في أعلى الخريطة هو:", options:["الشمال","الجنوب","الشرق","الغرب"], answer:1, exp:"جميع خرائط العرب القديمة كانت موجهة نحو الجنوب في أعلى الخريطة."},
{q:"الطبيب الإنجليزي الذي تعتبر جهوده البداية الفكرية لتطور نظم المعلومات الجغرافية بربط انتشار الكوليرا بمصادر المياه هو:", options:["جاك دنجر موند","جون سنو","روجر توملينسون","وليم ديفز"], answer:1, exp:"جون سنو رسم خريطة الكوليرا بلندن عام 1854."},
{q:"المؤسس الأول لنظم المعلومات الجغرافية والذي صمم مشروع (CGIS) الكندي هو:", options:["روجر توملينسون","جاك دنجر موند","جاكلين تيرويت","جون سنو"], answer:0, exp:"روجر توملينسون أسس المشروع عام 1964 لمسح الغابات."},
{q:"متى تم وضع الصياغة الكاملة لعلم الـ GIS وتحديد مكوناته ليصبح علماً مستقلاً يدرس بالجامعات؟", options:["1964","1982","1994","1999"], answer:3, exp:"عام 1999 تم وضع الصياغة الكاملة لعلم الـ GIS."},
{q:"ما هو الفارق الجوهري بين برامج الـ CAD (مثل الأوتوكاد) ونظم المعلومات الجغرافية (GIS)؟", options:["الـ CAD أسرع في الطباعة","الـ GIS يتميز بقوة تحليلية مكانية عالية (Topology) وربط بالبيانات الوصفية","الـ CAD يتعامل مع Raster فقط","لا يوجد فرق"], answer:1, exp:"الـ GIS يتميز بقوة الـ Topology وربط المعالم بالبيانات الوصفية للتحليل."},
{q:"أي مما يلي يعتبر من البرامج المفتوحة (المجانية) في نظم المعلومات الجغرافية؟", options:["ArcGIS","MapInfo","GRASS","Geomedia"], answer:2, exp:"برنامج GRASS و ILWIS من البرامج المفتوحة والمجانية."},
{q:"الخاصية التي تسمح للخريطة الرقمية بتحديد نطاق مساحي حول ظاهرة معينة (نقطية أو خطية) تسمى:", options:["الاستفسار Query","الحرم المكاني Buffer","الاشتقاق Extraction","التحويل Conversion"], answer:1, exp:"الحرم المكاني (Buffer) ينشئ نطاقاً حول المعالم الجغرافية."},
{q:"إذا أردنا بناء نموذج يوضح اتجاهات الميول وأشكال مخرات السيول في منطقة، نستخدم في GIS:", options:["Network Analysis","Buffer","Digital Elevation Model (DEM)","Simulation"], answer:2, exp:"نموذج الارتفاعات الرقمي (DEM) يستخدم لتحليل الانحدارات والهيدرولوجيا."},
{q:"عملية اختيار أفضل موقع لمدرسة بعيداً عن الطرق السريعة والمجاري المائية في نظم المعلومات الجغرافية تسمى:", options:["المحاكاة Simulation","التحليل الإحصائي","الاختيار الأمثل (Optimum Selection)","تحليل الشبكات"], answer:2, exp:"الاختيار الأمثل يستخدم معايير محددة لتقييم المواقع واختيار الأنسب."},
{q:"أداة الـ (Query) أو الاستفسار في الـ GIS تنقسم إلى بسيطة ومعقدة، مثال للاستفسار المعقد:", options:["البحث عن محافظة الفيوم","البحث عن مدن تزيد مساحتها عن 5 كم2 وتقع في الفيوم","النقر على معلم لمعرفة اسمه","قياس المسافة بين مدينتين"], answer:1, exp:"الاستفسار المعقد يتضمن أكثر من شرط في المعادلة."},
{q:"ما هي الخرائط التي تعتمد على بيانات تُمثل في شكل (مصفوفة خلايا) تحمل قيمة لمتوسط الارتفاع؟", options:["الخرائط الفراغية Space Maps","الخرائط الورقية","نماذج الارتفاع الرقمي (DEM) ذات البيانات الشبكية (Raster)","الخرائط الكادسترالية"], answer:2, exp:"البيانات الشبكية (Raster) تعتمد على الخلايا (Pixels/Cells)."},
{q:"تُعد عملية إرجاع الخريطة لإحداثياتها الحقيقية أولى خطوات إنتاج الخريطة الآلية وتسمى:", options:["Digitizing","Georeferencing","Symbology","Topology"], answer:1, exp:"الإرجاع الجغرافي Georeferencing هو الخطوة الأولى."},
{q:"تحويل الخرائط من نموذج البيانات الشبكية (Raster) إلى البيانات الخطية (Vector) يعتبر من عمليات:", options:["الإخراج Output","التخزين Storing","المعالجة Manipulation (التحويل)","الاستعلام Query"], answer:2, exp:"عمليات التحويل بين Raster و Vector تصنف ضمن المعالجة."},
{q:"علم الفوتوجرامتري (Photogrammetry) تطور بشكل كبير في القرن العشرين ويعني:", options:["إنشاء خرائط طبوغرافية من الصور الجوية المأخوذة رأسياً","استخدام الليزر الأرضي","تحليل البيانات بالذكاء الاصطناعي","رسم الخرائط بالرنين المغناطيسي"], answer:0, exp:"الفوتوجرامتري هو علم المساحة التصويرية لإنتاج الخرائط من الصور الجوية."},
{q:"أول مرة يطرح مصطلح GIS Science في ورقة بحثية كان في عام:", options:["1964","1969","1992","1999"], answer:2, exp:"في عام 1992 تم طرح مصطلح GIS Science لأول مرة."},
{q:"خريطة استرابو (في القرن الأول الميلادي) تميزت بأنها:", options:["موجهة نحو الجنوب","رسمت خطوط الطول والعرض مستقيمة دون تلاقيها عند القطبين","أول خريطة استخدمت الألوان","خريطة دائرية للقدس"], answer:1, exp:"استرابو رسم خطوط الطول والعرض مستقيمة وجعل الأرض جزيرة مستطيلة."},
{q:"الأداة التي تستخدم لتتبع ظواهر معينة مستقبلاً مثل الاختناقات المرورية أو الفيضانات لمعرفة تأثيرها السلبي تسمى:", options:["الاختيار الأمثل","تحليل الشبكات","المحاكاة (Simulation)","الاستعلام"], answer:2, exp:"المحاكاة تتيح وضع تصور مستقبلي للظواهر والكوارث وتأثيرها."},
{q:"أي من الأجهزة التالية يستخدم نبضات الليزر لإنشاء سحابة من النقاط تمثل سطح الأرض بدقة عالية؟", options:["Total Station","GPS","TLS (المسح الضوئي الليزري الأرضي)","أجهزة الرنين المغناطيسي"], answer:2, exp:"جهاز TLS يعتمد على نبضات الليزر لإنشاء سحابة نقاط (Point Cloud)."},
{q:"علم الجيوماتكس (Geomatics) يضم تحت مظلته العديد من العلوم، أي من الآتي ليس منها؟", options:["علم الخرائط (Cartography)","المساحة (Surveying)","علم الاجتماع (Sociology)","الاستشعار عن بعد (Remote Sensing)"], answer:2, exp:"الجيوماتكس يضم العلوم المكانية والهندسية وليس علم الاجتماع."},
{q:"عندما قام جاكلين تيرويت في الخمسينيات بدراسة مسوحات التخطيط، نظم البيانات إلى:", options:["طبقتين","أربعة طبقات (ارتفاعات، صخور، مياه، أراضي زراعية)","عشر طبقات","طبقة واحدة"], answer:1, exp:"جاكلين تيرويت طبق فكرة الطبقات الجغرافية وقسمها لأربعة."},
{q:"ما هي الخرائط التي تُظهر تفاصيل تفريد المدن وفك الزمام ومقياس رسمها يتراوح بين 1:500 و 1:2500؟", options:["الخرائط المليونية","الخرائط الطبوغرافية","الخرائط التفصيلية (الكادسترالية)","خرائط الأطالس"], answer:2, exp:"الخرائط التفصيلية مقياسها كبير جداً يوضح تفاصيل المباني والملكيات."},
{q:"من عيوب الخريطة الورقية مقارنة بالرقمية في عملية القياس:", options:["سهولة الحمل","دقة عجلة القياس والبلانيمتر أقل وتعتمد على خبرة القائم بها","الخريطة الورقية أدق","لا يمكن قياس المساحات عليها إطلاقاً"], answer:1, exp:"القياس اليدوي أقل دقة من الحساب الآلي لبرامج الـ GIS."},
{q:"الخرائط الموجودة على شبكة الإنترنت مثل خرائط جوجل Google Earth تصنف ضمن:", options:["الخرائط المحمولة Portable Maps","الخرائط الفراغية Space Maps","خرائط التوزيعات Thematic","الخرائط الكادسترالية"], answer:1, exp:"تصنف كخرائط فراغية Space Maps."},
{q:"برنامج ArcInfo تم إطلاقه عام 1982 عن طريق شركة:", options:["Microsoft","Autodesk","ESRI","Google"], answer:2, exp:"شركة إيزري (ESRI) التي أسسها جاك دنجر موند أطلقت البرنامج."},
{q:"خريطة الإدريسي (1154م) التي رسمها للملك روجر الثاني قسم فيها العالم إلى:", options:["5 أقاليم","7 أقاليم مأهولة، لكل إقليم 10 خرائط (المجموع 70)","12 إقليم","قارتين فقط"], answer:1, exp:"قسم الإدريسي العالم لسبعين قسماً (7 أقاليم × 10 خرائط)."},
{q:"العملية التي تقوم بإنشاء قاعدة بيانات مكانية جديدة بناءً على استقطاعها من قاعدة بيانات أخرى تسمى:", options:["الاستفسار Query","التحويل Conversion","الاشتقاق Extraction","الحرم المكاني Buffer"], answer:2, exp:"الاشتقاق هو استقطاع بيانات محددة لتكوين طبقة جديدة."},
{q:"من أهم متطلبات إنتاج الخريطة الآلية (الجانب التقني):", options:["فهم جغرافية المكان فقط","توافر الأجزاء الصلبة (Hardware) والبرمجيات (Software)","الورق والأحبار","عجلة القياس"], answer:1, exp:"الجانب التقني يعتمد على الحاسب (الصلب) والبرامج."},
{q:"الميزة التي تسمح بإخفاء وإظهار الظاهرات في الخرائط الرقمية تُعزى إلى:", options:["تنظيم البيانات في طبقات (Layers)","سرعة الإنترنت","دقة الطابعة","مقياس الرسم الكبير"], answer:0, exp:"نظام الطبقات يتيح التحكم في ظهور أو إخفاء المعالم المنفصلة."},
{q:"في نظام MIS (نظم إدارة المعلومات)، ما هو العنصر المفقود الذي يميز الـ GIS عنه؟", options:["البيانات الوصفية","التقارير المطبوعة","المعالجة الإحصائية","ربط البيانات بموقعها الجغرافي والإحداثيات للتحليل المكاني"], answer:3, exp:"الـ GIS يتميز بالمرجعية المكانية (Spatial Analysis)."},
{q:"خريطة العالم التي ظهرت في العصور الوسطى الأوروبية (خريطة مارينو سنودو 1321م) جعلت مركز العالم:", options:["روما","أورشليم","مكة","أثينا"], answer:1, exp:"خرائط العصور الوسطى المسيحية غالباً ما جعلت أورشليم في المركز لتعاليم دينية."},
{q:"المرجع الجيوديسي وتحويل المساقط يعتبر في الخرائط الرقمية:", options:["مستحيل","سهل وسريع جداً مقارنة بالورقية التي تتطلب عمليات حسابية معقدة","مكلف جداً","يتم يدوياً فقط"], answer:1, exp:"نظم الـ GIS تحول المساقط آلياً وبسهولة تامة."},

{q:"تعتبر عملية (الاختيار الأمثل - Optimum Selection) من أهم وظائف GIS، وضح بمثال.", keywords:["معايير","شروط","تسويق","مواقع"], model:"اختيار أفضل موقع بناءً على معايير، مثل اختيار موقع مدرسة بعيداً عن الطرق السريعة والمياه."},
{q:"ما هو دور جاك دنجر موند (Jack Dangermond) في تاريخ الـ GIS؟", keywords:["شركة","ايزري","esri","arcinfo","برمجيات"], model:"أسس شركة إيزري (ESRI) عام 1969 التي طورت أقوى برمجيات الـ GIS مثل ArcInfo."}
];

const allQuestions = [...mcqs, ...essays];
const totalQuestions = allQuestions.length;

let currentIndex = 0;
let currentScore = 0;
let isAnswerChecked = false; // عشان نعرف إحنا في مرحلة التأكيد ولا النقل للسؤال اللي بعده

// عناصر الـ DOM
const qCounter = document.getElementById('qCounter');
const qType = document.getElementById('qType');
const qTitle = document.getElementById('qTitle');
const inputArea = document.getElementById('inputArea');
const feedbackArea = document.getElementById('feedbackArea');
const actionBtn = document.getElementById('actionBtn');
const progressFill = document.getElementById('progressFill');

function renderCurrentQuestion() {
    isAnswerChecked = false;
    feedbackArea.style.display = 'none';
    feedbackArea.className = 'result-section';
    actionBtn.innerText = 'تأكيد الإجابة';
    actionBtn.classList.remove('next-mode');
    
    // تحديث شريط التقدم والعداد
    let perc = (currentIndex / totalQuestions) * 100;
    progressFill.style.width = `${perc}%`;
    qCounter.innerText = `سؤال ${currentIndex + 1} من ${totalQuestions}`;
    
    const qData = allQuestions[currentIndex];
    qTitle.innerText = qData.q;
    inputArea.innerHTML = '';
    
    if (currentIndex < 50) {
        // سؤال اختياري
        qType.innerText = 'اختيار من متعدد';
        let optionsHtml = '<div class="options-grid">';
        qData.options.forEach((opt, i) => {
            optionsHtml += `
                <label class="option-label" id="label_${i}">
                    <input type="radio" name="currentAnswer" value="${i}">
                    ${opt}
                </label>`;
        });
        optionsHtml += '</div>';
        inputArea.innerHTML = optionsHtml;
    } else {
        // سؤال مقالي
        qType.innerText = 'سؤال مقالي';
        inputArea.innerHTML = `<textarea id="essayInput" placeholder="اكتب إجابتك هنا يا بطل..."></textarea>`;
    }
}

function handleAction() {
    if (!isAnswerChecked) {
        // مرحلة التأكيد والتصحيح
        checkAnswer();
    } else {
        // مرحلة النقل للسؤال اللي بعده
        currentIndex++;
        if (currentIndex < totalQuestions) {
            renderCurrentQuestion();
        } else {
            showFinalScore();
        }
    }
}

function checkAnswer() {
    const qData = allQuestions[currentIndex];
    feedbackArea.style.display = 'block';
    let isCorrect = false;
    
    if (currentIndex < 50) {
        // تصحيح الاختياري
        const selected = document.querySelector('input[name="currentAnswer"]:checked');
        if (!selected) {
            alert('اختار إجابة الأول يا رِفْعَت!');
            feedbackArea.style.display = 'none';
            return;
        }
        
        // تعطيل الراديو
        document.querySelectorAll('input[name="currentAnswer"]').forEach(el => el.disabled = true);
        
        const userVal = parseInt(selected.value);
        if (userVal === qData.answer) {
            isCorrect = true;
            currentScore++;
            feedbackArea.className = 'result-section correct-bg';
            feedbackArea.innerHTML = `<strong>عاش! إجابتك صحيحة.</strong><br><em>التوضيح: ${qData.exp}</em>`;
        } else {
            feedbackArea.className = 'result-section wrong-bg';
            feedbackArea.innerHTML = `<strong>للأسف غلط!</strong> الإجابة الصح هي: <strong>${qData.options[qData.answer]}</strong><br><em>التوضيح: ${qData.exp}</em>`;
            // تلوين الاختيار الصح بالأخضر الخفيف
            document.getElementById(`label_${qData.answer}`).style.borderColor = "var(--success)";
            document.getElementById(`label_${qData.answer}`).style.backgroundColor = "#ecfdf5";
        }
    } else {
        // تصحيح المقالي
        const userInputBox = document.getElementById('essayInput');
        const userVal = userInputBox.value.toLowerCase().trim();
        
        if (userVal === '') {
            alert('اكتب أي إجابة الأول يا رِفْعَت!');
            feedbackArea.style.display = 'none';
            return;
        }
        
        userInputBox.disabled = true;
        
        let matchCount = 0;
        qData.keywords.forEach(kw => {
            if (userVal.includes(kw)) matchCount++;
        });

        // ناجح لو جاب جزء من الكلمات المفتاحية
        if (matchCount >= Math.max(1, Math.floor(qData.keywords.length * 0.3))) {
            isCorrect = true;
            currentScore++;
            feedbackArea.className = 'result-section correct-bg';
            feedbackArea.innerHTML = `<strong>ممتاز! كلامك في الصميم أو قريب جداً من الصح.</strong><br><div class="model-answer">الإجابة النموذجية:<br>${qData.model}</div>`;
        } else {
            feedbackArea.className = 'result-section wrong-bg';
            feedbackArea.innerHTML = `<strong>إجابتك بعيدة شوية عن المطلوب أو ناقصة.</strong><br><div class="model-answer">الإجابة النموذجية الصح هي:<br>${qData.model}</div>`;
        }
    }
    
    // تحويل الزرار للمرحلة التانية
    isAnswerChecked = true;
    if (currentIndex === totalQuestions - 1) {
        actionBtn.innerText = 'أظهر النتيجة النهائية';
    } else {
        actionBtn.innerText = 'السؤال اللي بعده';
    }
    actionBtn.classList.add('next-mode');
}

function showFinalScore() {
    document.getElementById('quizApp').style.display = 'none';
    const scoreBoard = document.getElementById('scoreBoard');
    const finalScoreText = document.getElementById('finalScoreText');
    const motivationText = document.getElementById('motivationText');
    
    scoreBoard.style.display = 'block';
    finalScoreText.innerText = `جبت ${currentScore} من ${totalQuestions}`;
    
    let perc = (currentScore / totalQuestions) * 100;
    if(perc >= 90) {
        motivationText.innerText = 'عاش يا رِفْعَت! أسطورة نظم المعلومات الجغرافية 🌍🔥';
    } else if(perc >= 70) {
        motivationText.innerText = 'بطل! مستوى ممتاز جداً، مجهودك واضح 👏';
    } else if(perc >= 50) {
        motivationText.innerText = 'حلو، بس أنا عارف إنك تقدر تجيب أعلى من كده، راجع المحاضرات وجرب تاني 💪';
    } else {
        motivationText.innerText = 'محتاجين نركز شوية يا صاحبي، اقرأ التوضيحات كويس وشد حيلك المرة الجاية 📚';
    }
}

// تشغيل أول سؤال لما الصفحة تفتح
window.onload = renderCurrentQuestion;
</script>
